<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 32" fill="none">
  <!--
    Nordassist — text-only wordmark
    Dotless-i (U+0131) — font renders no dot.
    Glowing blue dot at i-position with asymmetric halo + hover lift.
  -->
  <defs>
    <style>
      @keyframes nd-pulse{
        0%  {opacity:.07}
        42% {opacity:.17}
        100%{opacity:.07}
      }
      .nd-halo{animation:nd-pulse 5.5s cubic-bezier(.4,0,.2,1) infinite}
      /* Hover: only the dot group brightens */
      .nd-dot-group{
        transition:filter .2s ease;
      }
      .nd-dot-group:hover{
        filter:brightness(1.28) drop-shadow(0 0 3px rgba(10,132,255,.55));
      }
    </style>

    <!-- Asymmetric radial — falloff is slightly tighter on lower-right
         mimicking a light source from upper-left -->
    <radialGradient id="nd-halo-g" cx="46%" cy="44%" r="58%" fx="38%" fy="34%">
      <stop offset="0%"   stop-color="#0A84FF" stop-opacity="1"/>
      <stop offset="55%"  stop-color="#0A84FF" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#0A84FF" stop-opacity="0"/>
    </radialGradient>

    <!-- Inner highlight — off-centre to feel like a real light point -->
    <radialGradient id="nd-core" cx="34%" cy="28%" r="55%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#0A84FF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Wordmark: "Nordass" + dotless-i + "st" -->
  <text
    x="4" y="22"
    font-family="Inter,-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif"
    font-size="17" font-weight="600" letter-spacing="-0.3"
    fill="#FFFFFF">Nordass&#x0131;st</text>

  <!-- Dot group — interactive -->
  <g class="nd-dot-group">
    <!-- Halo: centre slightly offset (+0.6, -0.5) from core for asymmetry -->
    <circle class="nd-halo" cx="72.1" cy="8.0" r="3.5" fill="url(#nd-halo-g)"/>
    <!-- Core dot — precisely at i-dot position -->
    <circle cx="71.5" cy="8.5" r="1.6" fill="#0A84FF"/>
    <!-- Inner highlight overlay -->
    <circle cx="71.5" cy="8.5" r="1.6" fill="url(#nd-core)"/>
  </g>
</svg>
